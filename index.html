<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Birthday Advantage</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'Syne', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    touch-action: manipulation;
  }

  /* ── STAGE ── */
  #stage {
    width: 100vw; height: 100vh;
    position: relative; overflow: hidden;
    cursor: pointer;
  }

  /* ── CANVASES ── */
  #space-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* ── STEP 2 — TREE ── */
  #step2-wrap {
    position: absolute; inset: 0;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  #tree-svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  #tree-svg path.link {
    fill: none;
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
  }
  #tree-svg circle.node-circle {
    opacity: 0;
  }
  #tree-svg text.node-label {
    opacity: 0;
    font-family: 'Syne', sans-serif;
  }

  /* Step 2 text — centre overlay */
  #text-step2 {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 15;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(13,43,138,0.12);
    padding: 1.6rem 2.2rem;
    max-width: min(400px, 88vw);
    box-shadow: 0 8px 40px rgba(13,43,138,0.1);
  }
  #text-step2 .stat {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.5rem, 4.5vw, 2.2rem);
    font-weight: 400;
    color: #0d2b8a;
    line-height: 1.25;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #text-step2 .stat em { font-style: italic; }
  #text-step2 .sub {
    font-size: clamp(0.58rem, 1.8vw, 0.7rem);
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #aaa;
    margin-top: 0.7rem;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TEXT OVERLAY ── */
  #text-overlay {
    position: absolute; inset: 0;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }

  .step-text {
    position: absolute;
    text-align: center;
    padding: 0 2rem;
    opacity: 0;
    pointer-events: none;
    width: 100%;
  }

  /* Step 1 text — bottom third of screen */
  #text-step1 {
    bottom: 18%;
    left: 0; right: 0;
  }
  #text-step1 .big-stat {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 400;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  #text-step1 .big-stat em {
    font-style: italic;
    color: rgba(255,255,255,0.5);
  }
  #text-step1 .sub {
    font-family: 'Syne', sans-serif;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 1rem;
  }

  /* ── PROGRESS DOTS ── */
  #progress {
    position: absolute;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 0.5rem;
    z-index: 20;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.4s;
  }
  .dot.active { background: rgba(255,255,255,0.8); }
  .dot.on-dark { background: rgba(255,255,255,0.15); }
  .dot.on-dark.active { background: rgba(255,255,255,0.8); }

  /* ── BACK BUTTON ── */
  #btn-back {
    position: absolute;
    bottom: 1.6rem; left: 1.5rem;
    z-index: 20;
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    background: none; border: none;
    cursor: pointer;
    transition: color 0.2s;
    opacity: 0;
    pointer-events: none;
  }
  #btn-back:hover { color: rgba(255,255,255,0.7); }
  #btn-back.visible { opacity: 1; pointer-events: auto; }
  #btn-back.dark { color: rgba(0,0,0,0.35); }
  #btn-back.dark:hover { color: rgba(0,0,0,0.7); }

  /* ── TAP HINT ── */
  #tap-hint {
    position: absolute;
    bottom: 1.6rem; right: 1.5rem;
    z-index: 20;
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    opacity: 0;
    transition: color 0.4s;
  }
  #tap-hint.dark { color: rgba(0,0,0,0.3); }

  /* ── STEP 3 — BAR CHART ── */
  #step3-wrap {
    position: absolute; inset: 0;
    z-index: 6;
    opacity: 0;
    pointer-events: none;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  #step3-question {
    position: absolute;
    top: clamp(1.2rem, 4vw, 2.5rem);
    left: 0; right: 0;
    text-align: center;
    opacity: 0;
    z-index: 8;
  }
  #step3-question .q-text {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 400;
    color: #111;
    font-style: italic;
  }

  /* Football field */
  #football-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 7;
    opacity: 0;
  }

  /* Bar chart SVG */
  #bar-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="space-canvas"></canvas>

  <!-- Step 2 — Radial Tree -->
  <div id="step2-wrap">
    <svg id="tree-svg"></svg>
    <div id="text-step2">
      <div class="stat">We evaluated <em>138 teams</em><br/>and over <em>5,200 athletes</em></div>
      <div class="sub">Across 6 leagues worldwide</div>
    </div>
  </div>

  <!-- Step 3 — Bar Chart -->
  <div id="step3-wrap">
    <svg id="bar-svg"></svg>
    <canvas id="football-canvas"></canvas>
    <div id="step3-question">
      <div class="q-text">Birth Months Matter?</div>
    </div>
  </div>

  <!-- Step 4 — League Comparison -->
  <div id="step4-wrap" style="position:absolute;inset:0;z-index:7;opacity:0;pointer-events:none;overflow:hidden;"></div>

  <!-- Step 5 — When to have a baby -->
  <div id="step5-wrap" style="position:absolute;inset:0;z-index:8;opacity:0;pointer-events:none;overflow:hidden;"></div>

  <!-- Step 6 — Promo -->
  <div id="step6-wrap" style="position:absolute;inset:0;z-index:9;opacity:0;pointer-events:none;overflow:hidden;background:#000;">
    <canvas id="promo-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
    <div id="promo-text" style="
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;padding:2rem;
      opacity:0;transform:translateY(20px);
      pointer-events:none;z-index:2;
    ">
      <div style="font-family:'Instrument Serif',serif;font-size:clamp(0.65rem,2vw,0.85rem);font-weight:400;letter-spacing:0.28em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:1.2rem;">Explore more at</div>
      <div style="font-family:'Instrument Serif',serif;font-size:clamp(2.2rem,7vw,4.5rem);font-weight:400;color:#fff;line-height:1.05;letter-spacing:-0.01em;">www.willemsworld.fyi</div>
      <div style="font-family:'Syne',sans-serif;font-size:clamp(0.7rem,2.2vw,1rem);font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:1.2rem;">The World, Measured.</div>
    </div>
  </div>

  <div id="text-overlay">
    <!-- Step 1 -->
    <div class="step-text" id="text-step1">
      <div class="big-stat"><em>1 in 30,000</em><br/>people are<br/>Pro Athletes</div>
      <div class="sub">What separates them?</div>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress">
    <div class="dot active" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
    <div class="dot" id="dot-5"></div>
  </div>

  <button id="btn-back">← Back</button>
  <div id="tap-hint">Tap to continue</div>
</div>

<script>
/* ══════════════════════════════════════
   SPACE FLYTHROUGH — Step 1
══════════════════════════════════════ */
const canvas = document.getElementById('space-canvas');
const ctx    = canvas.getContext('2d');
let W, H, dots, blueDot, flyT, flyAnim, arrived = false;

const TOTAL = 8000, SPEED = 5, FOV = 300, DEPTH = 2000;
const TREE_DOT_R = 5.5;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function makeDot() {
  const a = Math.random()*Math.PI*2;
  const d = 30 + Math.random()*Math.max(W,H)*1.8;
  return { ox: W/2+Math.cos(a)*d, oy: H/2+Math.sin(a)*d,
           z: DEPTH*Math.random(), r: 1.4+Math.random()*1.8 };
}

function project(ox, oy, z) {
  if (z <= 1) return null;
  const s = FOV/z;
  return { sx: W/2+(ox-W/2)*s, sy: H/2+(oy-H/2)*s, scale: s };
}

function initFly() {
  flyT = 0; arrived = false;
  dots = [];
  for (let i=0;i<TOTAL;i++) dots.push(makeDot());
  blueDot = { ox: W/2, oy: H/2, z: DEPTH*0.62, r: TREE_DOT_R };
}

function drawFly() {
  flyT++;
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  if (arrived) return;

  blueDot.z -= SPEED;
  const bp = project(blueDot.ox, blueDot.oy, blueDot.z);
  const br = bp ? Math.min(bp.scale*blueDot.r, W*2) : 0;

  /* orange dots */
  const dotFade = bp ? Math.max(0, 1-(br/(Math.min(W,H)*0.7))) : 1;
  for (let i=0;i<dots.length;i++) {
    const d = dots[i]; d.z -= SPEED;
    if (d.z<=0){const f=makeDot();f.z=DEPTH;dots[i]=f;continue;}
    const p = project(d.ox,d.oy,d.z);
    if (!p||p.sx<-50||p.sx>W+50||p.sy<-50||p.sy>H+50) continue;
    const r = Math.min(p.scale*d.r,16); if(r<0.3) continue;
    ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,120,10,${Math.min(0.82,p.scale*1.1)*dotFade})`;
    ctx.fill();
  }

  /* blue dot */
  if (bp) {
    ctx.beginPath(); ctx.arc(bp.sx,bp.sy,Math.max(1,br),0,Math.PI*2);
    ctx.fillStyle = '#0d2b8a'; ctx.fill();
  }

  /* hit */
  const fullR = Math.min(W,H)/2 - 80;
  if (bp && br >= fullR * 0.88) {
    arrived = true;
    /* text disappears with the bang */
    gsap.to('#text-step1', { opacity: 0, duration: 0.2 });
    gsap.to('#tap-hint',   { opacity: 0, duration: 0.2 });
    /* flash white */
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,W,H);
    gsap.to('#space-canvas', { opacity: 0, duration: 0.5, delay: 0.1 });
    setTimeout(() => advanceStep(), 600);
    return;
  }

  flyAnim = requestAnimationFrame(drawFly);
}

/* ══════════════════════════════════════
   STEP MANAGEMENT
══════════════════════════════════════ */
let currentStep = 0;
const totalSteps = 6;

/* Show text for step 1 after a short delay */
function startStep1() {
  currentStep = 0;
  updateDots();

  /* Animate text in after 1.5s */
  gsap.to('#tap-hint', { opacity: 1, duration: 1, delay: 3 });
  gsap.to('#text-step1', {
    opacity: 1, y: 0,
    duration: 1.2, delay: 1.8,
    ease: 'power3.out'
  });

  /* Start fly */
  resize(); initFly();
  flyAnim = requestAnimationFrame(drawFly);
}

function advanceStep() {
  currentStep++;
  updateDots();
  updateBack();

  if (currentStep === 1) showStep2();
  if (currentStep === 2) showStep3();
  if (currentStep === 3) showStep4();
  if (currentStep === 4) showStep5();
  if (currentStep === 5) showStep6();
}

function goBack() {
  if (currentStep === 0) return;
  currentStep--;
  updateDots();
  updateBack();
  if (currentStep === 0) {
    gsap.to(['#step2-wrap','#step3-wrap','#step4-wrap'], { opacity: 0, duration: 0.4, onComplete: () => {
      treeBuilt = false;
      document.getElementById('tree-svg').innerHTML = '';
      document.getElementById('btn-back').classList.remove('dark');
      document.getElementById('tap-hint').classList.remove('dark');
      gsap.set('#space-canvas', { opacity: 1 });
      gsap.set('#text-step1', { opacity: 0, y: 20 });
      arrived = false; resize(); initFly();
      flyAnim = requestAnimationFrame(drawFly);
      gsap.to('#text-step1', { opacity: 1, y: 0, duration: 0.8, delay: 0.3, ease: 'power3.out' });
    }});
  } else if (currentStep === 1) {
    gsap.to(['#step3-wrap','#step4-wrap'], { opacity: 0, duration: 0.4, onComplete: () => {
      document.getElementById('bar-svg').innerHTML = '';
      gsap.set('#step3-question', { opacity: 0, y: -10 });
      gsap.set('#step2-wrap', { opacity: 1 });
      gsap.set('#text-step2', { opacity: 1, scale: 1 });
    }});
  } else if (currentStep === 2) {
    gsap.to('#step4-wrap', { opacity: 0, duration: 0.4, onComplete: () => {
      document.getElementById('step4-wrap').innerHTML = '';
      gsap.set('#step3-wrap', { opacity: 1 });
    }});
  }
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i === currentStep);
  });
}

function updateBack() {
  const btn = document.getElementById('btn-back');
  if (currentStep > 0) btn.classList.add('visible');
  else btn.classList.remove('visible');
}

/* ══════════════════════════════════════
   STEP 2 — RADIAL TREE (GSAP + D3 + SVG)
══════════════════════════════════════ */
const RAW = {"name":"Athletes","children":[{"name":"Football","children":[{"name":"NFL","children":[{"name":"Arizona Cardinals"},{"name":"Atlanta Falcons"},{"name":"Baltimore Ravens"},{"name":"Buffalo Bills"},{"name":"Carolina Panthers"},{"name":"Chicago Bears"},{"name":"Cincinnati Bengals"},{"name":"Cleveland Browns"},{"name":"Dallas Cowboys"},{"name":"Denver Broncos"},{"name":"Detroit Lions"},{"name":"Green Bay Packers"},{"name":"Houston Texans"},{"name":"Indianapolis Colts"},{"name":"Jacksonville Jaguars"},{"name":"Kansas City Chiefs"},{"name":"Las Vegas Raiders"},{"name":"Los Angeles Chargers"},{"name":"Los Angeles Rams"},{"name":"Miami Dolphins"},{"name":"Minnesota Vikings"},{"name":"New England Patriots"},{"name":"New Orleans Saints"},{"name":"New York Giants"},{"name":"New York Jets"},{"name":"Philadelphia Eagles"},{"name":"Pittsburgh Steelers"},{"name":"San Francisco 49ers"},{"name":"Seattle Seahawks"},{"name":"Tampa Bay Buccaneers"},{"name":"Tennessee Titans"},{"name":"Washington Commanders"}]}]},{"name":"Soccer","children":[{"name":"EPL","children":[{"name":"AFC Bournemouth"},{"name":"Arsenal"},{"name":"Aston Villa"},{"name":"Brentford"},{"name":"Brighton"},{"name":"Chelsea"},{"name":"Crystal Palace"},{"name":"Everton"},{"name":"Fulham"},{"name":"Liverpool"},{"name":"Manchester City"},{"name":"Manchester United"},{"name":"Newcastle United"},{"name":"Nottingham Forest"},{"name":"Tottenham Hotspur"},{"name":"West Ham United"},{"name":"Wolverhampton"}]},{"name":"La Liga","children":[{"name":"Athletic Club"},{"name":"Atletico Madrid"},{"name":"Barcelona"},{"name":"Celta Vigo"},{"name":"Espanyol"},{"name":"Getafe"},{"name":"Girona"},{"name":"Mallorca"},{"name":"Osasuna"},{"name":"Rayo Vallecano"},{"name":"Real Betis"},{"name":"Real Madrid"},{"name":"Real Sociedad"},{"name":"Sevilla"},{"name":"Valencia"},{"name":"Villarreal"}]},{"name":"Bundesliga","children":[{"name":"Bayer Leverkusen"},{"name":"Bayern Munich"},{"name":"Borussia Dortmund"},{"name":"Eintracht Frankfurt"},{"name":"FC Augsburg"},{"name":"Hamburg SV"},{"name":"Mainz"},{"name":"RB Leipzig"},{"name":"SC Freiburg"},{"name":"St. Pauli"},{"name":"TSG Hoffenheim"},{"name":"VfB Stuttgart"},{"name":"VfL Wolfsburg"},{"name":"Werder Bremen"}]},{"name":"Serie A","children":[{"name":"AC Milan"},{"name":"AS Roma"},{"name":"Atalanta"},{"name":"Bologna"},{"name":"Cagliari"},{"name":"Fiorentina"},{"name":"Internazionale"},{"name":"Juventus"},{"name":"Lazio"},{"name":"Napoli"},{"name":"Torino"},{"name":"Udinese"}]},{"name":"Ligue 1","children":[{"name":"AJ Auxerre"},{"name":"AS Monaco"},{"name":"Angers"},{"name":"Brest"},{"name":"Le Havre AC"},{"name":"Lens"},{"name":"Lille"},{"name":"Lorient"},{"name":"Lyon"},{"name":"Marseille"},{"name":"Nantes"},{"name":"Nice"},{"name":"Paris Saint-Germain"},{"name":"Stade Rennais"},{"name":"Strasbourg"},{"name":"Toulouse"}]}]}]};

let treeBuilt = false;

function showStep2() {
  /* Switch nav colours to dark */
  document.getElementById('btn-back').classList.add('dark');
  document.getElementById('tap-hint').classList.add('dark');
  gsap.to('#tap-hint', { color: 'rgba(0,0,0,0.3)', duration: 0.3 });

  /* Fade in white background wrap */
  const wrap = document.getElementById('step2-wrap');
  wrap.style.pointerEvents = 'none';
  gsap.to(wrap, { opacity: 1, duration: 0.5, ease: 'power2.out', onComplete: () => {
    buildTree();
  }});
}

function buildTree() {
  if (treeBuilt) return;
  treeBuilt = true;

  const svg   = document.getElementById('tree-svg');
  const W2    = window.innerWidth;
  const H2    = window.innerHeight;
  const cx    = W2 / 2;
  const cy    = H2 / 2;
  const R     = Math.min(W2, H2) / 2 - (W2 < 500 ? 80 : 130);

  svg.setAttribute('viewBox', `0 0 ${W2} ${H2}`);
  svg.setAttribute('width', W2);
  svg.setAttribute('height', H2);

  const root  = d3.hierarchy(RAW);
  d3.cluster().size([2 * Math.PI, R])(root);

  const g = d3.select(svg).append('g')
    .attr('transform', `translate(${cx},${cy})`);

  const lc = d => d.depth===1?'#0d2b8a':d.depth===2?'#1e4fc2':d.depth===3?'#1a4db5':'#999';

  /* Links */
  const links = g.selectAll('path.link')
    .data(root.links())
    .join('path')
    .attr('class','link')
    .attr('fill','none')
    .attr('stroke', d => d.target.depth===3?'rgba(26,77,181,0.18)':d.target.depth===2?'rgba(30,79,194,0.28)':'rgba(13,43,138,0.35)')
    .attr('stroke-width', d => d.target.depth===3?0.7:d.target.depth===2?1:1.5)
    .attr('d', d3.linkRadial().angle(d=>d.x).radius(d=>d.y));

  /* Animate links with stroke-dashoffset trick */
  links.each(function() {
    const len = this.getTotalLength ? this.getTotalLength() : 200;
    gsap.set(this, { strokeDasharray: len, strokeDashoffset: len });
  });

  /* Nodes */
  const node = g.selectAll('g.nd')
    .data(root.descendants())
    .join('g')
    .attr('class','nd')
    .attr('transform', d=>`rotate(${d.x*180/Math.PI-90}) translate(${d.y},0)`);

  const circles = node.append('circle')
    .attr('class','node-circle')
    .attr('r', d=>d.depth===0?6:d.depth===1?8:d.depth===2?5:3.5)
    .attr('fill','#fff')
    .attr('stroke', d=>lc(d))
    .attr('stroke-width', d=>d.depth<=1?2:1.5);

  /* Labels for non-leaf nodes */
  const labels = node.filter(d=>d.depth>0&&d.depth<3)
    .append('text')
    .attr('class','node-label')
    .attr('dy','.31em')
    .attr('x', d=>d.x<Math.PI?14:-14)
    .attr('text-anchor', d=>d.x<Math.PI?'start':'end')
    .attr('transform', d=>d.x>=Math.PI?'rotate(180)':null)
    .attr('font-size', d=>d.depth===1?13:9)
    .attr('font-weight', d=>d.depth===1?'700':'400')
    .attr('fill', d=>lc(d))
    .text(d=>d.data.name);

  /* Team labels */
  const teamLabels = node.filter(d=>d.depth===3)
    .append('text')
    .attr('class','node-label')
    .attr('dy','.31em')
    .attr('x', d=>d.x<Math.PI?9:-9)
    .attr('text-anchor', d=>d.x<Math.PI?'start':'end')
    .attr('transform', d=>d.x>=Math.PI?'rotate(180)':null)
    .attr('font-size', W2 < 500 ? 6.5 : 8)
    .attr('fill','#1a4db5')
    .text(d=>d.data.name);

  /* ── GSAP TIMELINE ── */
  const linkEls   = svg.querySelectorAll('path.link');
  const circleEls = svg.querySelectorAll('circle.node-circle');
  const labelEls  = svg.querySelectorAll('text.node-label');

  /* Set initial dash state on links */
  linkEls.forEach(el => {
    const len = el.getTotalLength ? el.getTotalLength() : 200;
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
  });

  gsap.set('#text-step2', { scale: 0.92 });

  const tl = gsap.timeline();

  /* Links draw in */
  tl.to(linkEls, {
    strokeDashoffset: 0,

    opacity: 1, scale: 1,

  }, 0.6);

  /* Labels fade in */

    opacity: 1,

/* ══════════════════════════════════════
   STEP 3 — BAR CHART + FOOTBALL
══════════════════════════════════════ */
const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const COUNTS     = [597,499,538,490,468,415,420,400,401,444,373,360];
const BAR_COLOR  = '#1a4db5';

function showStep3() {
  const wrap = document.getElementById('step3-wrap');
  wrap.style.pointerEvents = 'none';

  gsap.to('#step2-wrap', { opacity: 0, duration: 0.4, ease: 'power2.in', onComplete: () => {
    gsap.to(wrap, { opacity: 1, duration: 0.5, ease: 'power2.out', onComplete: buildBarChart });
  }});
}

function buildBarChart() {
  const svg  = document.getElementById('bar-svg');
  const W3   = window.innerWidth;
  const H3   = window.innerHeight;
  const isMobile = W3 < 600;

  const MAR  = {
    top:    isMobile ? 80  : 100,
    bottom: isMobile ? 80  : 90,
    left:   isMobile ? 30  : 60,
    right:  isMobile ? 20  : 40
  };

  const chartW = W3 - MAR.left - MAR.right;
  const chartH = H3 - MAR.top  - MAR.bottom;
  const barW   = chartW / 12;
  const maxV   = Math.max(...COUNTS);
  const minY   = 200; // y-axis min

  svg.setAttribute('viewBox', `0 0 ${W3} ${H3}`);
  svg.setAttribute('width',  W3);
  svg.setAttribute('height', H3);
  svg.innerHTML = '';

  const g = d3.select(svg).append('g');

  /* Y gridlines */
  [200,300,400,500,600].forEach(v => {
    const y = MAR.top + chartH * (1 - (v - minY)/(maxV - minY));
    g.append('line')
      .attr('x1', MAR.left).attr('x2', W3 - MAR.right)
      .attr('y1', y).attr('y2', y)
      .attr('stroke', 'rgba(0,0,0,0.06)').attr('stroke-width', 1);
    g.append('text')
      .attr('x', MAR.left - 6).attr('y', y + 4)
      .attr('text-anchor', 'end')
      .attr('font-family', 'Syne, sans-serif')
      .attr('font-size', isMobile ? 9 : 10)
      .attr('fill', '#bbb')
      .text(v);
  });

  /* Bars */
  const barPad = barW * 0.18;
  COUNTS.forEach((count, i) => {
    const bx  = MAR.left + i * barW + barPad;
    const bw  = barW - barPad * 2;
    const bh  = chartH * ((count - minY) / (maxV - minY));
    const by  = MAR.top + chartH - bh;

    /* Bar rect — starts at height 0 */
    g.append('rect')
      .attr('class', 'bar-rect')
      .attr('x', bx).attr('y', MAR.top + chartH)
      .attr('width', bw).attr('height', 0)
      .attr('rx', 3).attr('ry', 3)
      .attr('fill', BAR_COLOR)
      .attr('data-by', by)
      .attr('data-bh', bh);

    /* Month label */
    g.append('text')
      .attr('class', 'bar-label')
      .attr('x', bx + bw/2)
      .attr('y', MAR.top + chartH + (isMobile ? 16 : 20))
      .attr('text-anchor', 'middle')
      .attr('font-family', 'Syne, sans-serif')
      .attr('font-size', isMobile ? 9 : 11)
      .attr('font-weight', '600')
      .attr('fill', '#888')
      .attr('opacity', 0)
      .text(MONTHS[i]);

    /* Count label on top */
    g.append('text')
      .attr('class', 'bar-count')
      .attr('x', bx + bw/2)
      .attr('y', by - 6)
      .attr('text-anchor', 'middle')
      .attr('font-family', 'Syne, sans-serif')
      .attr('font-size', isMobile ? 8 : 10)
      .attr('font-weight', '700')
      .attr('fill', BAR_COLOR)
      .attr('opacity', 0)
      .text(count);
  });

  /* Animate bars up with stagger */
  const bars   = svg.querySelectorAll('.bar-rect');
  const labels = svg.querySelectorAll('.bar-label');
  const counts = svg.querySelectorAll('.bar-count');

  const tl = gsap.timeline();

  tl.to(bars, {
    attr: (i, el) => ({ y: el.getAttribute('data-by'), height: el.getAttribute('data-bh') }),
    duration: 0.6, stagger: 0.06, ease: 'power3.out'
  }, 0);

  tl.to(labels, { opacity: 1, duration: 0.3, stagger: 0.06, ease: 'power2.out' }, 0.4);
  tl.to(counts, { opacity: 1, duration: 0.3, stagger: 0.06, ease: 'power2.out' }, 0.5);

  tl.to('#step3-question', { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }, 0.3);
  gsap.set('#step3-question', { y: -10 });

  /* Store geometry for the transition */
  window._barGeo = { W3, H3, MAR, chartW, barW, minY, maxV: Math.max(...COUNTS), chartH };
}

/* ══════════════════════════════════════
   STEP 3 → 4 TRANSITION
   Early months (Jan Feb Mar Apr May Oct) detach forward
   Late months  (Jun Jul Aug Sep Nov Dec) stay / fade back
   Then league comparison slides in
══════════════════════════════════════ */
const FORWARD_IDX = [0,1,2,3,4,9];   // Jan Feb Mar Apr May Oct
const BACK_IDX    = [5,6,7,8,10,11]; // Jun Jul Aug Sep Nov Dec

/* ══════════════════════════════════════
   STEP 3 → 4 TRANSITION
   Forward bars (Jan Feb Mar Apr May Oct)
   zoom toward viewer, fill screen like
   the blue dot, then league comparison
   bursts through from centre
══════════════════════════════════════ */
function startBarDetach() {
  const geo  = window._barGeo;
  const svg  = document.getElementById('bar-svg');
  const bars   = Array.from(svg.querySelectorAll('.bar-rect'));
  const labels = Array.from(svg.querySelectorAll('.bar-label'));
  const counts = Array.from(svg.querySelectorAll('.bar-count'));

  gsap.to('#step3-question', { opacity: 0, duration: 0.3 });

  /* All bars turn navy together — no isolation, just blast through */
  gsap.to(bars,   { fill: '#0d2b8a', duration: 0.3, delay: 0.15 });
  gsap.to(labels, { fill: '#0d2b8a', duration: 0.3, delay: 0.15 });

  setTimeout(() => {
    runZoomRush(geo, bars, labels, counts);
  }, 500);
}

function runZoomRush(geo, bars, labels, labels2) {
  const W = window.innerWidth, H = window.innerHeight;

  const oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  oc.style.cssText = 'position:absolute;inset:0;z-index:9;pointer-events:none;';
  document.getElementById('stage').appendChild(oc);
  const oct = oc.getContext('2d');

  /* Snapshot ALL bars at their real values */
  const snap = document.createElement('canvas');
  snap.width = W; snap.height = H;
  const sCtx = snap.getContext('2d');

  bars.forEach(b => {
    const bx = parseFloat(b.getAttribute('x'));
    const by = parseFloat(b.getAttribute('y'));
    const bw = parseFloat(b.getAttribute('width'));
    const bh = parseFloat(b.getAttribute('height'));
    sCtx.fillStyle = '#0d2b8a';
    sCtx.beginPath(); sCtx.roundRect(bx, by, bw, bh, 3); sCtx.fill();
  });

  /* Centre the blast on the middle of the whole chart */
  const groupCx = W / 2;
  const groupCy = H / 2;

  /* Hide SVG immediately */
  gsap.to('#step3-wrap', { opacity: 0, duration: 0.2 });

  /* GSAP drives the scale — fast, punchy, like a cannon */
  const state = { scale: 1, whiteR: 0 };

  gsap.to(state, {
    scale: 28,
    duration: 0.55,
    ease: 'power4.in',     // accelerates hard — cannon feel
    onUpdate() {
      oct.clearRect(0, 0, W, H);
      oct.fillStyle = '#fff';
      oct.fillRect(0, 0, W, H);

      /* Bars blasting toward us */
      oct.save();
      oct.translate(groupCx, groupCy);
      oct.scale(state.scale, state.scale);
      oct.translate(-groupCx, -groupCy);
      oct.drawImage(snap, 0, 0);
      oct.restore();
    },
    onComplete() {
      /* White wipe from centre */
      gsap.to(state, {
        whiteR: Math.sqrt(W * W + H * H),
        duration: 0.25,
        ease: 'power2.out',
        onUpdate() {
          oct.clearRect(0, 0, W, H);
          oct.fillStyle = '#fff'; oct.fillRect(0, 0, W, H);
          oct.save();
          oct.translate(groupCx, groupCy);
          oct.scale(state.scale, state.scale);
          oct.translate(-groupCx, -groupCy);
          oct.drawImage(snap, 0, 0);
          oct.restore();
          oct.beginPath();
          oct.arc(groupCx, groupCy, state.whiteR, 0, Math.PI * 2);
          oct.fillStyle = '#fff'; oct.fill();
        },
        onComplete() {
          oc.remove();
          showLeagueComparison();
        }
      });
    }
  });
}

function buildLeagueChart() {
  fifaBarEls = [];
  nflBarEls  = [];
  const wrap = document.getElementById('step4-wrap');
  const W4   = window.innerWidth;
  const H4   = window.innerHeight;
  const isMobile = W4 < 600;
  const NAV  = 60;
  const sH   = (H4 - NAV) / 2;

  wrap.innerHTML = '';
  wrap.style.background = '#fff';

  /* Divider */
  const divEl = document.createElement('div');
  divEl.style.cssText = `position:absolute;left:24px;right:24px;top:${sH}px;height:1px;background:rgba(0,0,0,0.07);z-index:1;`;
  wrap.appendChild(divEl);

  function makeSection(months, color, title, dotColor, yOff, isFifa) {
    const div = document.createElement('div');
    div.style.cssText = `position:absolute;left:0;right:0;top:${yOff}px;height:${sH}px;overflow:hidden;`;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', W4); svg.setAttribute('height', sH);

    const lPad = isMobile ? 90 : 120;
    const rPad = isMobile ? 36 : 50;
    const tPad = isMobile ? 36 : 44;
    const bPad = isMobile ? 18 : 24;
    const chartW = W4 - lPad - rPad;
    const chartH = sH - tPad - bPad;
    const maxV   = Math.max(...months);
    const rowH   = chartH / 12;

    /* Header */
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', isMobile?14:18); dot.setAttribute('cy', isMobile?16:20);
    dot.setAttribute('r', isMobile?5:6); dot.setAttribute('fill', dotColor);
    svg.appendChild(dot);
    const titleEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    titleEl.setAttribute('x', isMobile?24:30); titleEl.setAttribute('y', isMobile?21:25);
    titleEl.setAttribute('font-family','Syne,sans-serif'); titleEl.setAttribute('font-size', isMobile?11:13);
    titleEl.setAttribute('font-weight','600'); titleEl.setAttribute('fill','#1a1a1a');
    titleEl.textContent = title; svg.appendChild(titleEl);

    months.forEach((v, i) => {
      const fullBw = (v / maxV) * chartW;
      const by  = tPad + i * rowH + rowH * 0.1;
      const bht = rowH * 0.72;

      /* track */
      const track = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      track.setAttribute('x', lPad); track.setAttribute('y', by);
      track.setAttribute('width', chartW); track.setAttribute('height', bht);
      track.setAttribute('rx', 2); track.setAttribute('fill', 'rgba(0,0,0,0.04)');
      svg.appendChild(track);

      /* bar — starts at 0, animates in */
      const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bar.setAttribute('class', 'league-bar');
      bar.setAttribute('x', lPad); bar.setAttribute('y', by);
      bar.setAttribute('width', 0); bar.setAttribute('height', bht);
      bar.setAttribute('rx', 2); bar.setAttribute('fill', color);
      bar.setAttribute('data-w', fullBw);
      bar.setAttribute('data-fullw', fullBw);
      svg.appendChild(bar);
      if (isFifa) fifaBarEls[i] = bar;
      else        nflBarEls[i]  = bar;

      /* month label */
      const mlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      mlbl.setAttribute('x', lPad-5); mlbl.setAttribute('y', by+bht/2+3.5);
      mlbl.setAttribute('text-anchor','end'); mlbl.setAttribute('font-family','Syne,sans-serif');
      mlbl.setAttribute('font-size', isMobile?8:9.5); mlbl.setAttribute('fill','#555');
      mlbl.textContent = MONTHS_FULL[i]; svg.appendChild(mlbl);
    });

    div.appendChild(svg); wrap.appendChild(div);

    /* Animate bars in */
    const barEls = svg.querySelectorAll('.league-bar');
    gsap.to(barEls, {
      attr: (i, el) => ({ width: el.getAttribute('data-w') }),
      duration: 0.65, stagger: 0.04, ease: 'power3.out', delay: 0.15
    });
  }

  makeSection(FIFA_M, '#5cb85c', 'FIFA — Top 5 European Leagues', '#5cb85c', 0,     true);
  makeSection(NFL_M,  '#f47c3c', 'NFL — National Football League', '#f47c3c', sH+1, false);
  /* Text overlay — hidden until triggered */
  const txt = document.createElement('div');
  txt.id = 'league-text';
  txt.style.cssText = `
    position:absolute; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0;
    background:rgba(255,255,255,0.92);
  `;
  txt.innerHTML = `
    <div style="text-align:center;padding:2rem;max-width:min(560px,88vw);margin:0 auto;">
      <div style="font-family:'Instrument Serif',serif;font-size:clamp(1.5rem,4.5vw,2.4rem);font-weight:400;color:#111;line-height:1.2;-webkit-font-smoothing:antialiased;margin-bottom:1.1rem;">
        Relative Age Effect
      </div>
      <div style="font-family:Syne,sans-serif;font-size:clamp(0.72rem,2vw,0.88rem);font-weight:400;color:#555;line-height:1.75;-webkit-font-smoothing:antialiased;">
        A phenomenon where children born shortly after a cutoff date for age-grouped activities — sports or school — have a competitive advantage over younger peers in the same cohort due to greater physical and emotional maturity. This bias results in an over-representation of older children at elite, professional, and youth selection levels, often leading to earlier dropout for younger-born peers.
      </div>
    </div>`;
  wrap.appendChild(txt);
}

    const cW   = leftW - lPad - rPad;
    const cH   = availH - tPad - bPad;
    const rowH = cH / 12;

       FIFA: zero line on LEFT edge */
    const zeroX = isNfl
      ? lPad + (Math.abs(xMin) / range) * cW   // NFL zero near right

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width', MID_W);
    svg.setAttribute('height', availH);
    svg.style.cssText = `position:absolute;top:${titleH}px;left:${leftW}px;opacity:0;`;
    svg.id = 'odds-svg-months';

    const tPad = isMobile ? 28 : 36;
    const bPad = isMobile ? 14 : 20;
    const cH   = availH - tPad - bPad;
    const rowH = cH / 12;
    const barH = rowH * 0.62;

    MONTHS_S.forEach((m, i) => {
      const y = tPad + i * rowH + (rowH - barH) / 2;
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x', MID_W / 2);
      lbl.setAttribute('y', y + barH/2 + 3.5);
      lbl.setAttribute('text-anchor','middle');
      lbl.setAttribute('font-family','Syne,sans-serif');
      lbl.setAttribute('font-size', isMobile?7:8.5);
      lbl.setAttribute('font-weight','700');
      lbl.setAttribute('fill','#888');
      lbl.textContent = m;
      svg.appendChild(lbl);
    });

    wrap.appendChild(svg);
  }

  makePanel(0,             NFL_ODD,  'NFL',  -20, 20,  true);
  makeCentreLabels();
  makePanel(0,                      NFL_ODD,  'NFL',  -20, 20,  true);
  makeCentreLabels();
  makePanel(leftW + MID_W - (isMobile ? 24 : 40), FIFA_ODD, 'FIFA', -44, 44, false);

  /* Animate */
  gsap.set('#odds-title', { y: 14 });
  const tl = gsap.timeline();
  tl.to('#odds-title', { opacity:1, y:0, duration:0.7, ease:'power3.out' }, 0.1);
  tl.to(['#odds-svg-nfl','#odds-svg-months','#odds-svg-fifa'], { opacity:1, duration:0.4 }, 0.5);

  const allBars = wrap.querySelectorAll('.odds-bar');
  allBars.forEach(bar => {
    const bpx = parseFloat(bar.getAttribute('data-bpx'));
    const pos  = bar.getAttribute('data-pos') === '1';
    tl.to(bar, {
      attr: pos ? { width: bpx } : { x: `-=${bpx}`, width: bpx },
      duration: 0.5, ease: 'power3.out'
    }, 0.7);
  });

  tl.to(wrap.querySelectorAll('.odds-val'), {
    opacity: 1, duration: 0.3, stagger: 0.025
  }, 1.2);
}

/* ══════════════════════════════════════
   STEP 6 — GLOBE PROMO
══════════════════════════════════════ */
function showStep6() {
  gsap.to('#step5-wrap', { opacity: 0, duration: 0.5, ease: 'power2.in', onComplete: () => {
    const wrap = document.getElementById('step6-wrap');
    wrap.style.pointerEvents = 'auto';
    gsap.to(wrap, { opacity: 1, duration: 0.8, ease: 'power2.out' });
    startPromoGlobe();
    gsap.to('#promo-text', { opacity: 1, y: 0, duration: 1.1, delay: 1.0, ease: 'power3.out' });
  }});
}

function startPromoGlobe() {
  const canvas = document.getElementById('promo-canvas');
  const ctx    = canvas.getContext('2d');
  const DPR    = window.devicePixelRatio || 1;
  let W, H, R, cx, cy;
  let rot = 0.4;
  const SPEED = 0.0014;

  const LAND = [
    [[72,-75],[70,-100],[70,-130],[60,-140],[55,-132],[50,-125],[47,-122],[35,-120],[32,-117],[22,-106],[16,-90],[10,-83],[8,-77],[9,-80],[16,-86],[22,-97],[30,-97],[30,-90],[35,-76],[41,-71],[44,-66],[48,-66],[50,-55],[55,-58],[60,-64],[66,-62],[70,-64],[72,-70]],
    [[10,-62],[8,-60],[3,-51],[0,-50],[-5,-35],[-10,-37],[-15,-38],[-20,-40],[-23,-43],[-30,-50],[-35,-57],[-40,-62],[-45,-65],[-52,-68],[-55,-67],[-55,-64],[-50,-68],[-45,-65],[-38,-57],[-34,-58],[-28,-48],[-20,-41],[-10,-36],[-5,-34],[0,-48],[5,-52],[8,-60]],
    [[37,24],[38,15],[44,15],[46,8],[48,17],[50,14],[54,18],[56,21],[59,25],[62,26],[65,28],[68,28],[70,26],[72,25],[70,20],[68,15],[65,14],[60,5],[56,8],[51,-5],[48,-4],[43,-8],[38,-9],[36,-5],[36,3],[36,10]],
    [[38,10],[38,25],[28,33],[22,37],[12,43],[0,41],[-5,39],[-12,40],[-25,33],[-34,27],[-34,19],[-26,16],[-18,12],[-5,10],[0,7],[5,2],[4,-7],[5,-5],[10,-15],[15,-17],[18,-16],[22,-16],[26,-15],[15,0],[10,-16],[5,-5],[0,7],[0,41]],
    [[70,29],[65,36],[60,40],[55,40],[50,40],[45,37],[45,48],[40,48],[35,36],[28,34],[22,39],[12,45],[8,48],[5,55],[5,103],[10,106],[15,108],[20,110],[25,120],[30,120],[35,120],[38,120],[42,130],[48,135],[55,160],[60,170],[65,162],[70,160],[72,140],[70,120],[68,110],[65,100],[65,90],[68,80],[70,60],[70,50]],
    [[-15,129],[-12,136],[-14,141],[-18,146],[-24,152],[-32,152],[-36,150],[-38,146],[-38,140],[-34,136],[-32,116],[-22,114],[-17,122]],
    [[60,-44],[65,-42],[68,-22],[74,-18],[80,-18],[83,-26],[82,-38],[76,-65],[70,-55],[65,-52],[60,-46]],
  ];

  function ptInPoly(lat, lng, poly) {
    let inside = false;
    for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
      const [yi,xi]=poly[i], [yj,xj]=poly[j];
      if (((xi>lng)!==(xj>lng)) && (lat<(yj-yi)*(lng-xi)/(xj-xi)+yi)) inside=!inside;
    }
    return inside;
  }
  function onLand(lat,lng){ return LAND.some(p=>ptInPoly(lat,lng,p)); }

  let PARTICLES=[];
  function buildParticles() {
    PARTICLES=[];
    const N=5800;
    for(let i=0;i<N;i++){
      const y=1-(i/(N-1))*2, r=Math.sqrt(Math.max(0,1-y*y));
      const phi=i*2.399963, x=r*Math.cos(phi), z=r*Math.sin(phi);
      const lat=Math.asin(y)*180/Math.PI, lng=Math.atan2(z,x)*180/Math.PI;
      const land=onLand(lat,lng);
      if(Math.random()>(land?1.0:0.28)) continue;
      PARTICLES.push({x:x+(Math.random()-.5)*.005, y:y+(Math.random()-.5)*.005, z:z+(Math.random()-.5)*.005,
        land, size:land?(Math.random()<.18?2.2:1.3):(Math.random()<.08?1.5:.85),
        twinkle:Math.random()*Math.PI*2, twinkleSpeed:(Math.random()*.4+.1)*(Math.random()<.5?1:-1)});
    }
    for(let lat=-60;lat<=60;lat+=30) for(let lng=-180;lng<=180;lng+=2.5){
      const phi=(90-lat)*Math.PI/180, theta=lng*Math.PI/180;
      PARTICLES.push({x:Math.sin(phi)*Math.cos(theta),y:Math.cos(phi),z:Math.sin(phi)*Math.sin(theta),land:false,grid:true,size:.5,twinkle:0,twinkleSpeed:0});
    }
    for(let lng=-180;lng<180;lng+=30) for(let lat=-88;lat<=88;lat+=2){
      const phi=(90-lat)*Math.PI/180, theta=lng*Math.PI/180;
      PARTICLES.push({x:Math.sin(phi)*Math.cos(theta),y:Math.cos(phi),z:Math.sin(phi)*Math.sin(theta),land:false,grid:true,size:.5,twinkle:0,twinkleSpeed:0});
    }
  }

  function resize(){
    W=canvas.width=window.innerWidth*DPR; H=canvas.height=window.innerHeight*DPR;
    canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
    R=Math.min(W,H)*0.44; cx=W/2; cy=H/2;
  }

  function drawFrame(){
    ctx.clearRect(0,0,W,H);
    const cosR=Math.cos(rot), sinR=Math.sin(rot), now=Date.now()*.001;
    const projected=PARTICLES.map(p=>{
      const rx=p.x*cosR-p.z*sinR, ry=p.y, rz=p.x*sinR+p.z*cosR;
      return {p,rx,ry,rz,sx:cx+rx*R,sy:cy-ry*R};
    });
    projected.sort((a,b)=>a.rz-b.rz);
    projected.forEach(({p,rz,sx,sy})=>{
      if(rz<-0.05) return;
      let alpha,r;
      if(p.grid){ alpha=rz*0.18; r=p.size*DPR*0.8; }
      else if(p.land){ const tw=Math.sin(now*p.twinkleSpeed+p.twinkle)*0.12; alpha=Math.min(1,rz*0.85+0.15+tw); r=p.size*DPR; }
      else { const tw=Math.sin(now*p.twinkleSpeed+p.twinkle)*0.07; alpha=Math.min(.55,rz*.4+.06+tw); r=p.size*DPR*.8; }
      if(alpha<0.02) return;
      if(p.land&&p.size>2&&rz>0.3){ ctx.beginPath(); ctx.arc(sx,sy,r*2.5,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${alpha*.08})`; ctx.fill(); }
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2);
      ctx.fillStyle=p.grid?`rgba(180,180,180,${alpha})`:p.land?`rgba(255,255,255,${alpha})`:`rgba(160,160,160,${alpha})`;
      ctx.fill();
    });
    const ring=ctx.createRadialGradient(cx,cy,R*.94,cx,cy,R*1.06);
    ring.addColorStop(0,'rgba(255,255,255,0)'); ring.addColorStop(.5,'rgba(255,255,255,0.03)'); ring.addColorStop(1,'rgba(255,255,255,0.10)');
    ctx.beginPath(); ctx.arc(cx,cy,R*1.06,0,Math.PI*2); ctx.fillStyle=ring; ctx.fill();
    rot+=SPEED;
    requestAnimationFrame(drawFrame);
  }

  resize();
  buildParticles();
  window.addEventListener('resize', resize);
  drawFrame();
}
/* ══════════════════════════════════════
   EVENTS
══════════════════════════════════════ */
document.getElementById('stage').addEventListener('click', () => {
  if (currentStep === 0 && !arrived) {
    cancelAnimationFrame(flyAnim);
    arrived = true;
    gsap.to('#text-step1', { opacity: 0, duration: 0.3 });
    gsap.to('#space-canvas', { opacity: 0, duration: 0.4 });
    setTimeout(() => advanceStep(), 500);
  } else if (currentStep === 1) {
    gsap.to('#text-step2', { opacity: 0, duration: 0.3, onComplete: () => advanceStep() });
  } else if (currentStep === 2) {
    advanceStep();
  } else if (currentStep === 3) {
    advanceLeague();
  } else if (currentStep === 4) {
    gsap.to('#step5-wrap', { opacity: 0, duration: 0.4, onComplete: () => advanceStep() });
  } else if (currentStep >= 5) {
    /* end of story */
  }
});

document.getElementById('btn-back').addEventListener('click', e => {
  e.stopPropagation();
  goBack();
});

window.addEventListener('resize', resize);

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
window.addEventListener('load', () => {
  gsap.set('#text-step1', { y: 20 });
  startStep1();
});
</script>
